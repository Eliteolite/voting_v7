<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Your Ballot - NTIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header><h1>Review Your Selections</h1></header>

    <div class="card">
        <div id="receiptList"></div>
        <button id="submitBtn" onclick="submitVote()" style="margin-top: 20px;">Cast My Final Vote</button>
    </div>
</div>

<script>
// REPLACE WITH YOUR URL
const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE";
const selections = JSON.parse(localStorage.getItem("selections") || "{}");

function renderReceipt() {
    let html = "";
    for (const pos in selections) {
        html += `
        <div class="option" style="cursor:default; justify-content: space-between;">
            <div style="text-align:left;">
                <small style="color:var(--text-muted)">${pos}</small><br>
                <strong>${selections[pos]}</strong>
            </div>
            <button onclick="goToEdit('${pos}')" style="width:auto; padding: 5px 12px; font-size: 0.8rem; background:rgba(255,255,255,0.05);">Change</button>
        </div>`;
    }
    document.getElementById("receiptList").innerHTML = html;
}

function goToEdit(pos) {
    localStorage.setItem("jumpToPosition", pos);
    localStorage.setItem("singleEditMode", "true"); 
    window.location.href = "vote.html";
}

async function submitVote() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Syncing with Cloud...";
    btn.disabled = true;

    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                voter: localStorage.getItem("currentVoter") || "Anonymous",
                selections: selections
            })
        });

        localStorage.removeItem("selections");
        window.location.href = "thankyou.html";
    } catch (e) {
        alert("Upload failed. Check your internet connection.");
        btn.disabled = false;
        btn.innerText = "Cast My Final Vote";
    }
}

renderReceipt();
</script>
</body>
</html>
