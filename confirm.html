<!DOCTYPE html>
<html>
<head>
<title>Confirm Vote</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
<h1>NTIC - KANO</h1>
<p>Confirm Your Vote</p>
</div>
<div class="card" id="confirmCard"></div>
<script>
const selections=JSON.parse(localStorage.getItem("selections"));
let html="";
for(let pos in selections){
html+=`<p><strong>${pos}</strong><br>${selections[pos]}</p>`;
}
html+=`<button onclick="submitVote()">Confirm Vote</button>`;
document.getElementById("confirmCard").innerHTML=html;

function submitVote(){
let allVotes=JSON.parse(localStorage.getItem("allVotes")||"[]");
let voter=localStorage.getItem("currentVoter");
allVotes.push({voter:voter,selections:selections});
localStorage.setItem("allVotes",JSON.stringify(allVotes));
window.location.href="thankyou.html";
}
</script>
</body>
</html>
