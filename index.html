<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - NTIC Voting</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .live-status {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0, 255, 136, 0.1); color: #00ff88;
            padding: 4px 12px; border-radius: 20px; font-size: 0.65rem;
            font-weight: 800; margin-bottom: 16px; border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .dot { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <div class="live-status"><span class="dot"></span> ELECTION LIVE</div>
        <h1>NTIC - KANO</h1>
        <p>Student Representative Council</p>
    </header>

    <div class="card">
        <h2 style="font-size: 1.25rem; margin-bottom: 8px;">Voter Authentication</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 30px;">Enter your student ID to access your digital ballot.</p>

        <div style="margin-bottom: 25px; text-align: left;">
            <label style="display:block; font-size:0.7rem; color:var(--text-muted); margin-bottom:8px; font-weight:700;">ADMISSION NUMBER</label>
            <input type="text" id="studentId" placeholder="e.g. KAN/2026/123">
            <p id="error" style="color: #fb7185; font-size: 0.8rem; margin-top: 8px; min-height: 1.2em;"></p>
        </div>

        <button onclick="startVoting()">Verify & Access</button>
    </div>

    <footer>© 2026 NTIC-KANO SRC Elections</footer>
</div>

<script>
function startVoting() {
    const idInput = document.getElementById("studentId");
    const errorDiv = document.getElementById("error");
    const id = idInput.value.trim();
    if (!id) {
        errorDiv.innerText = "⚠ ID is required to access the election.";
        return;
    }
    localStorage.setItem("currentVoter", id);
    window.location.href = "vote.html";
}
document.getElementById("studentId").addEventListener("keypress", (e) => { if (e.key === "Enter") startVoting(); });
</script>
</body>
</html>
