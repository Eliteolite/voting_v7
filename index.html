<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - NTIC Voting</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .card { backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        input[type="text"] { text-transform: uppercase; letter-spacing: 1px; font-weight: 600; text-align: center; }
        .live-badge { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Official SRC Election Portal</p>
    </header>
    <div class="card">
        <div class="live-badge"><div class="pulse"></div>Election is Live</div>
        <h2>Voter Authentication</h2>
        <div class="input-group">
            <label>Admission Number</label>
            <input type="text" id="studentId" placeholder="KAN/XXXX/XXX" autocomplete="off">
            <p id="error" class="error-msg"></p>
        </div>
        <button id="loginBtn" onclick="startVoting()">Access My Ballot</button>
    </div>
</div>
<script>
const SCRIPT_URL = "YOUR_WEB_APP_URL";
async function startVoting() {
    const idInput = document.getElementById("studentId");
    const id = idInput.value.trim().toUpperCase(); // Force uppercase
    if (!id) return;
    
    document.getElementById("loginBtn").innerText = "Authenticating...";
    const response = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}`);
    const result = await response.json();

    if (result.valid) {
        localStorage.setItem("currentVoter", id);
        window.location.href = "vote.html";
    } else {
        document.getElementById("error").innerText = "❌ ID not found. Contact Admin.";
        document.getElementById("loginBtn").innerText = "Access My Ballot";
    }
}
</script>
</body>
</html>
