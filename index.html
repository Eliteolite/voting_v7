<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - NTIC Voting</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .pulse {
            width: 8px; height: 8px; background: #34d399; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Official SRC Election Portal</p>
    </header>

    <div class="card">
        <div class="live-badge">
            <div class="pulse"></div>
            Election is Live
        </div>
        
        <h2 style="margin-bottom: 10px;">Voter Authentication</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">Please enter your ID to access your digital ballot.</p>

        <div class="input-group">
            <label for="studentId">Student Admission Number</label>
            <input type="text" id="studentId" placeholder="e.g. KAN/2026/123" autocomplete="off">
            <p id="error" class="error-msg"></p>
        </div>

        <button id="loginBtn" onclick="startVoting()">Verify & Access Ballot</button>
    </div>

    <footer>
        <p>Your vote is 100% anonymous and secure.</p>
        <p>© 2026 NTIC-KANO SRC Elections</p>
    </footer>
</div>

<script>
// REPLACE WITH YOUR URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";

async function startVoting() {
    const idInput = document.getElementById("studentId");
    const errorDiv = document.getElementById("error");
    const btn = document.getElementById("loginBtn");
    const id = idInput.value.trim();

    if (!id) {
        errorDiv.innerText = "⚠ ID is required to access the election.";
        idInput.style.borderColor = "#fb7185";
        return;
    }

    btn.innerText = "Verifying ID...";
    btn.disabled = true;

    try {
        const response = await fetch(`${SCRIPT_URL}?id=${encodeURIComponent(id)}`);
        const result = await response.json();

        if (result.valid) {
            localStorage.setItem("currentVoter", id);
            window.location.href = "vote.html";
        } else {
            errorDiv.innerText = "❌ Access Denied: ID not found in the official list.";
            idInput.style.borderColor = "#fb7185";
            btn.disabled = false;
            btn.innerText = "Verify & Access Ballot";
        }
    } catch (e) {
        errorDiv.innerText = "⚠ Connection error. Check internet.";
        btn.disabled = false;
        btn.innerText = "Verify & Access Ballot";
    }
}

document.getElementById("studentId").addEventListener("keypress", (e) => {
    if (e.key === "Enter") startVoting();
});
</script>
</body>
</html>
