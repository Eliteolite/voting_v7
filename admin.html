<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .container { max-width: 900px; }
        .summary-table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 20px; }
        .summary-table th { padding: 15px; background: #161b22; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; border-radius: 4px; }
        .summary-table td { padding: 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }
        .accordion-item { background: #161b22; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border-color); overflow: hidden; }
        .accordion-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { display: none; padding: 20px; background: #05070a; border-top: 1px solid var(--border-color); }
        .badge { background: rgba(0, 204, 255, 0.1); color: var(--primary); padding: 4px 10px; border-radius: 4px; font-weight: bold; border: 1px solid var(--primary); font-size: 0.8rem; }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <h1>Election Dashboard</h1>
        <p>Live Statistics & Results</p>
    </header>

    <div class="card" id="login-section">
        <h3 style="margin-bottom: 20px;">Administrator Access</h3>
        <input type="password" id="pass" placeholder="Password" style="margin-bottom: 15px;">
        <button onclick="login()">Enter Dashboard</button>
    </div>

    <div id="dashboard" style="display: none;">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 1rem;">Leaderboard Summary</h3>
                <button onclick="exportFullCSV()" style="width: auto; padding: 8px 16px; font-size: 0.75rem; background: transparent; border: 1px solid var(--primary); color: var(--primary);">Export CSV</button>
            </div>
            <table class="summary-table">
                <thead><tr><th>Position</th><th>Leader</th><th>Tally</th></tr></thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <div id="accordion-container" style="margin-top: 30px;"></div>
    </div>
</div>

<script>
const ADMIN_PASS = "admin123";
function login() {
    if(document.getElementById("pass").value === ADMIN_PASS) {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        loadStats();
    } else { alert("Unauthorized"); }
}

function loadStats() {
    const votes = JSON.parse(localStorage.getItem("allVotes") || "[]");
    if(votes.length === 0) return;
    const positions = Object.keys(votes[0].selections);
    const leaderboardBody = document.getElementById("leaderboard-body");
    const accordionContainer = document.getElementById("accordion-container");

    positions.forEach(pos => {
        let counts = {};
        votes.forEach(v => { let choice = v.selections[pos]; counts[choice] = (counts[choice] || 0) + 1; });
        let winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
        
        leaderboardBody.innerHTML += `<tr><td>${pos}</td><td><strong>${winner}</strong></td><td><span class="badge">${counts[winner]}</span></td></tr>`;

        let item = document.createElement("div");
        item.className = "accordion-item";
        item.innerHTML = `<div class="accordion-header" onclick="toggleAccordion(this)"><span>${pos}</span><span style="color:var(--primary)">+</span></div>
            <div class="accordion-content"><canvas id="chart-${pos.replace(/\s+/g, '')}"></canvas></div>`;
        accordionContainer.appendChild(item);

        new Chart(document.getElementById(`chart-${pos.replace(/\s+/g, '')}`), {
            type: 'doughnut',
            data: {
                labels: Object.keys(counts),
                datasets: [{ data: Object.values(counts), backgroundColor: ['#00ccff', '#818cf8', '#fb7185', '#34d399', '#facc15'], borderWidth: 0 }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#848d97' } } } }
        });
    });
}

function toggleAccordion(header) {
    const content = header.nextElementSibling;
    const isVisible = content.style.display === "block";
    content.style.display = isVisible ? "none" : "block";
    header.querySelector('span:last-child').innerText = isVisible ? "+" : "-";
}
</script>
</body>
</html>
