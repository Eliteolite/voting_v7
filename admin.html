<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .summary-table { width: 100%; border-collapse: collapse; text-align: left; }
        .summary-table th { color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--card-border); }
        .summary-table td { padding: 15px; border-bottom: 1px solid var(--card-border); }
        .badge { background: rgba(0, 229, 255, 0.1); color: var(--primary); border: 1px solid rgba(0, 229, 255, 0.3); padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <header><h1>Admin Control</h1><p>Election Analytics</p></header>
    <div class="card" id="login-section">
        <input type="password" id="pass" placeholder="Master Key" style="margin-bottom: 20px;">
        <button onclick="login()">Enter Dashboard</button>
    </div>
    <div id="dashboard" style="display:none;" class="card">
        <h3 style="margin-bottom: 20px; text-align: left;">Live Tally</h3>
        <table class="summary-table"><tbody id="leaderboard-body"></tbody></table>
    </div>
</div>
<script>
function login() {
    if(document.getElementById("pass").value === "admin123") {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        load();
    }
}
function load() {
    // Logic for loading stats remains the same as your original script,
    // just ensure the table rows match the new styles.
}
</script>
</body>
</html>
