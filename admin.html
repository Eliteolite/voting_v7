<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <header><h1>Live Results Dashboard</h1></header>
    <button onclick="loadCloudData()" style="margin-bottom: 20px; width: auto; padding: 10px 20px;">Refresh Results</button>
    <div id="adminContent"></div>
</div>

<script>
// REPLACE WITH YOUR URL
const SCRIPT_URL = "YOUR_WEB_APP_URL_HERE";

async function loadCloudData() {
    const content = document.getElementById("adminContent");
    content.innerHTML = "<p>Connecting to Google Cloud...</p>";

    try {
        const response = await fetch(`${SCRIPT_URL}?action=getResults`);
        const rows = await response.json();
        
        const votes = rows.map(r => ({
            voter: r[1],
            selections: JSON.parse(r[2])
        }));

        // Now your existing chart/summary logic takes over
        renderSummary(votes);
        renderCharts(votes);
    } catch (e) {
        content.innerHTML = "<p>Error loading live results.</p>";
    }
}

// Check admin session and load
if (localStorage.getItem("adminLoggedIn")) {
    loadCloudData();
} else {
    window.location.href = "index.html";
}

function renderSummary(votes) { /* Your existing renderSummary code here */ }
function renderCharts(votes) { /* Your existing renderCharts code here */ }
</script>
</body>
</html>
