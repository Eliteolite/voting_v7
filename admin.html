<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container" style="max-width: 900px;">
    <header><h1>Live Results Dashboard</h1></header>
    <button onclick="loadCloudData()" style="margin-bottom: 20px; width: auto; padding: 10px 20px;">Refresh Results</button>
    <div id="adminContent"></div>
</div>

<script>
// Replace the entire <script> section of your admin.html
const ADMIN_PASS = "admin123";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXOhIa6_b0Ux7-p0LPy7X12lyFIcwfaIF50_moD7mcKp2K-XFZx9ZXYRkueWDwwchu/exec";

function login() {
    if(document.getElementById("pass").value === ADMIN_PASS) {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("dashboard").style.display = "grid";
        loadStats(); // Fetches from cloud
    } else {
        alert("Incorrect password");
    }
}

async function loadStats() {
    const leaderboardBody = document.getElementById("leaderboard-body");
    const accordionContainer = document.getElementById("accordion-container");
    leaderboardBody.innerHTML = "Loading live data...";

    try {
        const response = await fetch(`${SCRIPT_URL}?action=getResults`);
        const rows = await response.json();
        
        // Transform Google Sheet rows into the format your charts expect
        const votes = rows.map(r => ({ voter: r[1], selections: JSON.parse(r[2]) }));
        
        if(votes.length === 0) {
            leaderboardBody.innerHTML = "No votes recorded yet.";
            return;
        }

        leaderboardBody.innerHTML = "";
        const posKeys = Object.keys(votes[0].selections);

        posKeys.forEach(pos => {
            let counts = {};
            votes.forEach(v => {
                let choice = v.selections[pos];
                counts[choice] = (counts[choice] || 0) + 1;
            });

            let winner = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            
            leaderboardBody.innerHTML += `<tr>
                <td>${pos}</td>
                <td><strong>${winner}</strong></td>
                <td><span class="badge">${counts[winner]}</span></td>
            </tr>`;

            // Accordion and Chart rendering remain the same as your original
            createChart(pos, counts, accordionContainer);
        });
    } catch (e) {
        leaderboardBody.innerHTML = "Error fetching cloud data.";
    }
                                                                           }
</script>
</body>
</html>
