<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .check-circle { font-size: 4rem; color: #00ff88; margin-bottom: 20px; }
        .success-box { background: rgba(0, 255, 136, 0.05); border: 1px solid rgba(0, 255, 136, 0.1); padding: 20px; border-radius: 8px; margin: 30px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" style="text-align: center;">
        <div class="check-circle">✓</div>
        <h1>Vote Recorded</h1>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Your ballot has been securely submitted to the SRC Election database.</p>

        <div class="success-box">
            <p style="font-size: 0.75rem; color: #00ff88; font-weight: 800; text-transform: uppercase;">Identity Secure</p>
            <p style="font-size: 0.85rem; margin-top: 5px;">Your session has been terminated for your privacy.</p>
        </div>

        <button onclick="window.location.href='index.html'" style="background: transparent; border: 1px solid var(--border-color); color: white;">Return to Home</button>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 24px;">Auto-redirecting in <span id="seconds" style="color: var(--primary);">10</span>s</p>
    </div>
</div>
<script>
    let t = 10;
    setInterval(() => {
        t--;
        document.getElementById('seconds').innerText = t;
        if(t <= 0) window.location.href = 'index.html';
    }, 1000);
</script>
</body>
</html>
