<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .thank-you-card { padding: 80px 40px; border: 2px solid var(--primary); }
        .checkmark-circle { width: 80px; height: 80px; background: #34d399; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 40px; color: white; box-shadow: 0 0 30px rgba(52, 211, 153, 0.4); }
    </style>
</head>
<body onload="launchConfetti()">
<div class="container">
    <div class="card thank-you-card">
        <div class="checkmark-circle">✓</div>
        <h1>Vote Cast Successfully!</h1>
        <p class="sub-text">Thank you for participating in the NTIC-Kano SRC Elections. Your response has been securely synced to the cloud.</p>
        <button onclick="window.location.href='index.html'" style="background: rgba(255,255,255,0.05); width: auto; padding: 12px 30px;">Back to Home</button>
    </div>
</div>

<script>
function launchConfetti() {
    const colors = ['#38bdf8', '#34d399', '#fb7185', '#facc15', '#a78bfa'];
    for(let i=0; i<150; i++) {
        let div = document.createElement('div');
        div.style.cssText = `
            position: fixed; width: ${Math.random() * 10 + 5}px; height: ${Math.random() * 10 + 5}px;
            background: ${colors[Math.floor(Math.random()*colors.length)]};
            top: 100%; left: 50%; z-index: 9999; border-radius: 2px; pointer-events: none;
        `;
        document.body.appendChild(div);

        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 15 + 10;
        let vx = Math.cos(angle) * velocity;
        let vy = Math.sin(angle) * velocity - 15;
        let x = window.innerWidth / 2;
        let y = window.innerHeight / 1.2;

        function update() {
            x += vx; y += vy; vy += 0.5; // gravity
            div.style.transform = `translate(${x - (window.innerWidth/2)}px, ${y - (window.innerHeight/1.2)}px) rotate(${y}deg)`;
            if (y < window.innerHeight + 100) requestAnimationFrame(update);
            else div.remove();
        }
        requestAnimationFrame(update);
    }
}
</script>
</body>
</html>
