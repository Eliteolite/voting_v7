<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote - NTIC Elections</title>
    <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Official SRC Election Portal</p>
    </header>

    <div class="card" id="votingCard"></div>

    <footer>© 2026 NTIC-KANO SRC Elections</footer>
</div>

<script>
const positions = {
    "SRC Co-Leader": ["Kubura Mustapha", "Fatima Auwal Adam Sani", "Bilkisu Murtala"],
    "SRC Assist. Co-Leader": ["Rihanna Ahmad Abdulwahab", "Zainab Ismail Mai-Adamu", "Cindy Fechi Ohuruzo"],
    "Well-being Ambassador": ["Mufidah Nababa", "Ameerah Morenike Ibrahim", "Fatima Mai Hamza"],
    "SRC Secretary": ["Bilkisu Dauda Suleiman", "Fatima Mamman Farafara", "Fatima Tsofo", "Amatullah Lawal", "Halima Abdulqadir"],
    "Event Organizer": ["Yesmin Sadiq Bello", "Aisha Musta Ahmad", "Silakasi Nama Joshua", "Safiyta Bello Maiwada"],
    "Sports Captain": ["Favour Enewo Jimoh"],
    "Library Assistant": ["Zainab Mustapha", "Naila Sani", "Khadija Girgir", "Aisha Aliyu Musa"],
    "Hostel Coordinator": ["Asma'u Bala Getso", "Amina Amina Uzairu", "Ummu Salma Kabir Lawal"],
    "Dining Hall Coordinator": ["No candidate yet"],
    "School Ameerah": ["Aisha Bilyameen Gebe", "Amatur-Rahman Abdulqadir"],
    "School Sister": ["No candidate yet"]
};

const positionKeys = Object.keys(positions);
let currentIndex = 0;
let selections = JSON.parse(localStorage.getItem("selections") || "{}");
const jumpTo = localStorage.getItem("jumpToPosition");
const isSingleEdit = localStorage.getItem("singleEditMode") === "true";

if (jumpTo && positionKeys.includes(jumpTo)) currentIndex = positionKeys.indexOf(jumpTo);

function renderPosition() {
    const currentPos = positionKeys[currentIndex];
    const progressPercent = Math.round(((currentIndex + 1) / positionKeys.length) * 100);
    
    let html = `
        <div style="margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 700; text-transform: uppercase;">
                <span>${currentPos}</span>
                <span style="color: var(--primary)">${progressPercent}% Complete</span>
            </div>
            <div class="progress-bar"><div class="progress" style="width: ${progressPercent}%"></div></div>
            </div>
        </div>
        <h2 style="text-align: left; margin-bottom: 20px; font-size: 1.4rem;">Select Candidate</h2>
    `;

    positions[currentPos].forEach(name => {
        const isChecked = (selections[currentPos] === name) ? "checked" : "";
        html += `
        <label class="option">
            <span style="font-size: 1rem; font-weight: 500;">${name}</span>
            <input type="radio" name="candidate" value="${name}" ${isChecked}>
        </label>`;
    });

    const btnText = isSingleEdit ? "Save & Return" : (currentIndex === positionKeys.length - 1 ? "Review Ballot" : "Next Position");
    html += `<button onclick="next()" style="margin-top: 20px;">${btnText}</button>`;
    document.getElementById("votingCard").innerHTML = html;
}

function next() {
    const selected = document.querySelector('input[name="candidate"]:checked');
    if (!selected) { alert("Please make a selection."); return; }
    selections[positionKeys[currentIndex]] = selected.value;
    localStorage.setItem("selections", JSON.stringify(selections));
    if (isSingleEdit) {
        localStorage.removeItem("singleEditMode");
        localStorage.removeItem("jumpToPosition");
        window.location.href = "confirm.html"; 
    } else {
        currentIndex++;
        currentIndex < positionKeys.length ? renderPosition() : window.location.href = "confirm.html";
    }
}
renderPosition();
</script>
</body>
</html>
